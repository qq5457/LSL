<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵兽录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="app">
  <header class="titlebar">
    <h1>灵 兽 录</h1>
    <div class="sub">挂机 · 收集 · 长养</div>
  </header>

  <div class="playerbar">
    <span>Lv.<b id="pLevel">1</b></span>
    <div class="expbar-wrap"><div class="expbar" id="pExpBar" style="width:0%"></div></div>
    <span id="pExpTxt">0/0</span>
  </div>

  <div class="stats-row">
    <div class="stat-cell"><div class="label">金币</div><div class="val" id="rGold">0</div></div>
    <div class="stat-cell"><div class="label">兽魂</div><div class="val" id="rSoul">0</div></div>
    <div class="stat-cell"><div class="label">宠物仓库</div><div class="val" id="rPetCount">0</div></div>
    <div class="stat-cell"><div class="label">探索区域</div><div class="val" id="rMapName">-</div></div>
  </div>

  <main>
    <div id="tab-explore">
      <div class="section-title">选择地图</div>
      <div class="maps-grid" id="mapsGrid"></div>

      <div class="section-title">主力灵兽</div>
      <div class="active-pet-card" id="activePetCard"></div>

      <button class="explore-btn" id="exploreBtn">开 始 探 索</button>

      <div class="section-title">探索日志</div>
      <div class="log-area" id="logArea"></div>
    </div>

    <div id="tab-pets" style="display:none;">
      <div class="section-title">宠物仓库（点击查看详情）</div>
      <div class="pet-list" id="petList"></div>
    </div>

    <div id="tab-bag" style="display:none;">
      <div class="section-title">资源</div>
      <div class="res-grid">
        <div class="res-cell"><div class="rl">金币</div><div class="rv" id="bagGold">0</div></div>
        <div class="res-cell"><div class="rl">兽魂</div><div class="rv" id="bagSoul">0</div></div>
        <div class="res-cell"><div class="rl">装备材料</div><div class="rv" id="bagMat">0</div></div>
        <div class="res-cell"><div class="rl">宠物经验（可培养用）</div><div class="rv" id="bagPetExp">0</div></div>
      </div>
      <div class="section-title">玩家装备</div>
      <div class="equip-slots" id="equipSlots"></div>
      <div class="section-title">未装备物品（绿色高亮 = 比身上好）</div>
      <div class="pet-list" id="equipInv"></div>
    </div>

    <div id="tab-settings" style="display:none;">
      <div class="section-title">自动管理</div>
      <div class="setting-row">
        <div class="setting-label">普通宠物自动炼化<small>获得的普通（非宝宝）灵兽自动转化为兽魂</small></div>
        <label class="switch"><input type="checkbox" id="setAutoRefine"><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <div class="setting-label">「宝」永久保留<small>带宝宝词条的灵兽不会被自动炼化</small></div>
        <label class="switch"><input type="checkbox" id="setKeepBaby"><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <div class="setting-label">Boss 永久保留<small>王级灵兽不会被自动炼化</small></div>
        <label class="switch"><input type="checkbox" id="setKeepBoss"><span class="slider"></span></label>
      </div>

      <div class="section-title" style="margin-top:16px;">挂机节奏</div>
      <div class="speed-opts" id="speedOpts">
        <div class="speed-opt" data-v="4200">悠闲</div>
        <div class="speed-opt" data-v="2400">正常</div>
        <div class="speed-opt" data-v="1200">急速</div>
      </div>

      <div class="section-title" style="margin-top:16px;">存档</div>
      <div class="btnrow">
        <button class="mini-btn primary" id="btnSaveNow">立即存档</button>
        <button class="mini-btn danger" id="btnReset">重置存档</button>
      </div>
      <div class="btnrow">
        <button class="mini-btn primary" id="btnExport">导出存档文件</button>
        <button class="mini-btn" id="btnImport">导入存档文件</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
      </div>
      <div class="empty-hint" style="padding:8px 0 0; text-align:left; line-height:1.6;">
        存档保存在浏览器本地存储。建议定期导出备份。
      </div>
      <div class="empty-hint" id="playTimeTxt" style="padding:14px 0 0;"></div>
    </div>
  </main>

  <nav class="tabbar">
    <button class="active" data-tab="explore">探索</button>
    <button data-tab="pets">宠物</button>
    <button data-tab="bag">背包</button>
    <button data-tab="settings">设置</button>
  </nav>

  <footer class="savebar">
    <span id="saveStatus">已存档</span>
    <span id="clockTxt"></span>
  </footer>
</div>

<div class="modal-mask" id="petDetailModal">
  <div class="modal-box" id="petDetailBox"></div>
</div>

<div class="modal-mask" id="harvestModal">
  <div class="modal-box">
    <h2>今日收获</h2>
    <div class="modal-sub" id="harvestSub">你离开了一段时间，灵兽录为你自动记录了这段时间的探索成果：</div>
    <div class="harvest-list" id="harvestList"></div>
    <button class="modal-close" id="harvestClose">知道了</button>
  </div>
</div>

<script src="scripts/config.js"></script>
<script src="scripts/utils.js"></script>
<script src="scripts/storage.js"></script>
<script src="scripts/state.js"></script>
<script src="scripts/pet.js"></script>
<script src="scripts/combat.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/main.js"></script>
</body>
</html>
